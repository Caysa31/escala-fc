workflows:

  # ── Android ─────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release (Google Play)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        KEYSTORE_PATH: /tmp/cobra-bola.keystore
      node: 22.13.0
      java: 21

    scripts:
      - name: Instalar dependências
        script: |
          npm install

      - name: Instalar e verificar pacotes Capacitor
        script: |
          npm install @capacitor/core@8.4.0 @capacitor/cli@8.4.0 @capacitor/android@8.4.0 @capacitor/ios@8.4.0 @capacitor/splash-screen@8.0.1 @capacitor/status-bar@8.0.2
          echo "=== @capacitor packages instalados ==="
          ls node_modules/@capacitor/
          echo "=== @capacitor/android subdirs ==="
          ls node_modules/@capacitor/android/
          echo "=== @capacitor/android/capacitor (deve ter build.gradle) ==="
          ls node_modules/@capacitor/android/capacitor/
          echo "=== @capacitor/splash-screen/android (deve ter build.gradle) ==="
          ls node_modules/@capacitor/splash-screen/android/
          echo "=== @capacitor/status-bar/android (deve ter build.gradle) ==="
          ls node_modules/@capacitor/status-bar/android/

      - name: Criar arquivos de config Capacitor (cap sync manual)
        script: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/xml
          mkdir -p out

          # capacitor.config.json → lido pelo app em runtime
          cat > android/app/src/main/assets/capacitor.config.json << 'EOF'
          {
            "appId": "com.cobradabola.app",
            "appName": "Cobra da Bola",
            "webDir": "public",
            "server": {
              "url": "https://cobra-craque.vercel.app",
              "cleartext": false
            }
          }
          EOF

          # capacitor.plugins.json → registro de plugins nativos
          cat > android/app/src/main/assets/capacitor.plugins.json << 'EOF'
          {
            "ios": [],
            "android": [
              {
                "pkg": "@capacitor/splash-screen",
                "classpath": "com.capacitorjs.plugins.splashscreen.SplashScreenPlugin"
              },
              {
                "pkg": "@capacitor/status-bar",
                "classpath": "com.capacitorjs.plugins.statusbar.StatusBarPlugin"
              }
            ]
          }
          EOF

          # Tenta cap sync para gerar config.xml e demais arquivos
          npx cap sync android 2>&1 || echo "cap sync falhou, continuando com config manual..."

          echo "=== Assets gerados ==="
          ls android/app/src/main/assets/

      - name: Decodificar keystore
        script: |
          # Decodifica base64 via Python (mais robusto que base64/openssl no macOS)
          python3 -c "import base64,os,sys; d=os.environ.get('KEYSTORE_BASE64',''); b=base64.b64decode(d) if d else b''; open('$KEYSTORE_PATH','wb').write(b); print('Keystore:',len(b),'bytes'); print('Hex:',b[:8].hex()) if b else print('ERRO: KEYSTORE_BASE64 vazio')"

          echo "=== Diagnóstico keystore ==="
          echo "KEY_ALIAS=[${KEY_ALIAS}]"
          echo "Tamanho do arquivo: $(wc -c < $KEYSTORE_PATH) bytes"
          echo "Primeiros bytes (hex): $(xxd $KEYSTORE_PATH | head -2)"
          keytool -list -keystore $KEYSTORE_PATH -storepass "$KEYSTORE_PASSWORD" -storetype JKS 2>&1 | head -15

      - name: Build Android (.aab)
        script: |
          cd android
          chmod +x gradlew
          echo "=== Verificando estrutura Gradle antes do build ==="
          ls ../node_modules/@capacitor/android/capacitor/
          ls ../node_modules/@capacitor/splash-screen/android/
          ls ../node_modules/@capacitor/status-bar/android/
          echo "=== Iniciando bundleRelease ==="
          echo "KEY_ALIAS=[${KEY_ALIAS}]"
          ./gradlew bundleRelease --stacktrace

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab

    # publishing para Google Play — ativar depois de criar a conta
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true


  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cobradabola.app
      groups:
        - app_store_connect       # variáveis de ambiente do App Store Connect
      node: 22.13.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Instalar dependências
        script: npm ci

      - name: Adicionar plataforma iOS
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Instalar pods
        script: |
          cd ios/App
          pod install

      - name: Build iOS (.ipa)
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # revisão manual antes de publicar
